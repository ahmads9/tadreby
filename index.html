<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="تدريبي">
<meta name="theme-color" content="#7C3AED">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>تدريبي</title>
<style>
:root{--d1:#7C3AED;--d1l:#EDE9FE;--d1d:#5B21B6;--d2:#059669;--d2l:#D1FAE5;--d2d:#065F46;--d3:#2563EB;--d3l:#DBEAFE;--d3d:#1E3A5F;--d4:#D97706;--d4l:#FEF3C7;--d4d:#92400E;--bg:#F5F5F7;--card:#FFFFFF;--border:#E5E7EB;--text:#111827;--muted:#6B7280;--light:#F3F4F6;--accent:#7C3AED}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;display:flex;flex-direction:column}
#app{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column}
.screen{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s}
.screen.hidden{transform:translateX(-100%);opacity:0;pointer-events:none}
.hdr{background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);padding:env(safe-area-inset-top,0) 0 0;position:sticky;top:0;z-index:50}
.hdr-inner{padding:14px 18px 12px;display:flex;align-items:center;gap:12px}
.hdr h2{font-size:17px;font-weight:700;flex:1;text-align:center}
.hdr-sub{font-size:11px;color:var(--muted);text-align:center;padding:0 18px 10px}
.back-btn{width:32px;height:32px;border-radius:50%;background:var(--light);border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.home-hero{padding:calc(env(safe-area-inset-top,0) + 20px) 20px 8px}
.home-hero h1{font-size:28px;font-weight:800;letter-spacing:-.5px}
.home-hero p{font-size:13px;color:var(--muted);margin-top:4px}
.streak-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 16px}

.streak-chip{background:var(--card);border-radius:12px;padding:12px 14px;text-align:center;border:1px solid var(--border)}
.streak-val{font-size:20px;font-weight:800;color:#111827;direction:ltr}
.streak-lbl{font-size:11px;color:#6B7280;margin-top:3px}
.days-list{padding:4px 16px 100px;display:flex;flex-direction:column;gap:10px}
.day-card{background:var(--card);border-radius:18px;border:1.5px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .12s}
.day-card:active{transform:scale(.98)}
.day-card-top{padding:16px 18px 10px;display:flex;justify-content:space-between;align-items:flex-start}
.day-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:10px}
.day-card-title{font-size:16px;font-weight:700;padding:0 18px 4px}
.day-card-meta{font-size:11px;color:var(--muted);padding:0 18px 14px;display:flex;gap:12px;flex-wrap:wrap}
.pbar{height:4px;background:var(--light)}
.pbar-fill{height:100%;border-radius:2px;transition:width .4s}
.check-circle{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.sec-lbl{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.4px;margin:16px 18px 8px;display:flex;align-items:center;gap:8px}
.sec-lbl::after{content:'';flex:1;height:.5px;background:var(--border)}
.wu-card{margin:0 16px;background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden}
.wu-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:.5px solid var(--light)}
.wu-row:last-child{border-bottom:none}
.wu-name{font-size:13px;font-weight:600}
.wu-note{font-size:10px;color:var(--muted);margin-top:1px}
.wu-sets{font-size:12px;font-weight:700;background:var(--light);padding:3px 9px;border-radius:8px;white-space:nowrap}
.block-wrap{margin:0 16px 10px}
.block-hdr{display:flex;align-items:center;gap:6px;padding:10px 14px;background:var(--card);border-radius:14px 14px 0 0;border:1px solid var(--border);border-bottom:.5px solid var(--light);flex-wrap:wrap}
.block-lbl{font-size:11px;font-weight:700;padding:3px 8px;border-radius:7px}
.block-note{font-size:11px;color:var(--muted);flex:1;min-width:60px}
.block-rest{font-size:10px;background:var(--light);color:var(--muted);padding:3px 8px;border-radius:7px;white-space:nowrap}
.block-body{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 14px 14px;overflow:hidden}
.pha-sep{background:var(--light);text-align:center;padding:5px;font-size:10px;color:var(--muted);letter-spacing:1px;border-top:.5px solid var(--border);border-bottom:.5px solid var(--border)}
.ex-item{padding:14px;border-bottom:.5px solid var(--light)}
.ex-item:last-child{border-bottom:none}
.ex-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.ex-id{font-size:10px;font-weight:700;margin-bottom:2px}
.ex-name{font-size:15px;font-weight:700}
.ex-target{font-size:11px;color:var(--muted);margin-top:2px}
.ex-equip{font-size:10px;background:var(--light);padding:2px 8px;border-radius:6px;display:inline-block;margin-top:4px}
.ex-warn{font-size:10px;color:#DC2626;font-weight:600;margin-top:4px}
.ex-prescribed{font-size:13px;font-weight:800;padding-right:6px;white-space:nowrap}
.sets-wrap{display:flex;flex-direction:column;gap:6px}
.set-row{display:flex;align-items:center;gap:8px;background:var(--light);border-radius:10px;padding:8px 10px;transition:background .2s}
.set-row.done-row{background:#F0FDF4}
.set-n{font-size:11px;font-weight:600;color:var(--muted);min-width:26px}
.set-fields{display:flex;gap:6px;flex:1}
.field-group{display:flex;flex-direction:column;align-items:center;gap:2px}
.field-lbl{font-size:9px;color:var(--muted)}
.set-inp{border:1.5px solid var(--border);border-radius:8px;padding:6px 4px;font-size:14px;font-weight:700;text-align:center;width:62px;background:white;color:var(--text);font-family:inherit;-webkit-appearance:none}
.set-inp:focus{outline:none}
.set-inp.ro{background:var(--light);color:var(--muted);border-color:transparent}
.done-btn{width:34px;height:34px;border-radius:50%;border:2px solid var(--border);background:white;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.done-btn.is-done{color:white}
.tab-bar{background:rgba(255,255,255,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid var(--border);padding:8px 0 calc(env(safe-area-inset-bottom,0) + 6px);display:flex;position:sticky;bottom:0;z-index:50}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 0}
.tab-icon{font-size:22px}
.tab-label{font-size:10px;color:var(--muted)}
.tab-btn.active .tab-label{font-weight:700}
.save-bar{padding:10px 16px calc(env(safe-area-inset-bottom,0) + 10px);background:rgba(245,245,247,.95);backdrop-filter:blur(10px);border-top:.5px solid var(--border)}
.save-btn{width:100%;padding:14px;border-radius:14px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .12s}
.save-btn:active{transform:scale(.98)}
.hist-list{padding:8px 16px 100px;display:flex;flex-direction:column;gap:8px}
.hist-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px 16px}
.hist-date{font-size:11px;color:var(--muted);margin-bottom:4px}
.hist-day{font-size:14px;font-weight:700;margin-bottom:8px}
.hist-ex{display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:4px}
.hist-ex-name{color:var(--muted)}
.hist-sets{display:flex;gap:4px}
.hist-pill{font-size:10px;font-weight:600;background:var(--light);padding:2px 7px;border-radius:6px}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:#111;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.install-banner{margin:0 16px 8px;background:linear-gradient(135deg,#7C3AED,#5B21B6);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer}
.install-banner.hidden{display:none}
.install-text{flex:1;color:white;font-size:12px;font-weight:600}
.install-sub{font-size:10px;color:rgba(255,255,255,.75);margin-top:2px}
.install-btn{background:white;color:#7C3AED;border:none;padding:7px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
</style>
</head>
<body>
<div id="app">
  <div id="screen-home" class="screen">
    <div class="home-hero">
      <h1>تدريبي 💪</h1>
      <p>ريكومب / PHA — حرق الدهون + تشديد</p>
    </div>
    <div id="install-banner" class="install-banner hidden">
      <div class="install-text">أضف التطبيق لشاشتك الرئيسية<div class="install-sub">يشتغل بدون إنترنت ويحفظ بياناتك</div></div>
      <button class="install-btn" onclick="showInstallGuide()">تثبيت</button>
    </div>
    <div class="streak-row" id="stats-row"></div>
    <div class="sec-lbl">أيام الأسبوع</div>
    <div class="days-list" id="days-list"></div>
  </div>
  <div id="screen-workout" class="screen hidden">
    <div class="hdr">
      <div class="hdr-inner">
        <button class="back-btn" onclick="goHome()">←</button>
        <h2 id="wk-title"></h2>
        <div style="width:32px"></div>
      </div>
      <div class="hdr-sub" id="wk-sub"></div>
    </div>
    <div id="wk-content"></div>
    <div class="save-bar">
      <button class="save-btn" id="save-btn" onclick="saveWorkout()">💾 حفظ التدريب</button>
    </div>
  </div>
  <div id="screen-history" class="screen hidden">
    <div class="hdr"><div class="hdr-inner"><h2>السجل 📊</h2></div></div>
    <div class="hist-list" id="hist-list"></div>
  </div>
</div>
<div class="tab-bar" id="tab-bar">
  <button class="tab-btn active" id="tab-home" onclick="switchTab('home')">
    <span class="tab-icon">🏠</span><span class="tab-label">الرئيسية</span>
  </button>
  <button class="tab-btn" id="tab-history" onclick="switchTab('history')">
    <span class="tab-icon">📊</span><span class="tab-label">السجل</span>
  </button>
</div>
<div class="toast" id="toast"></div>
<script>
const DAYS=[{id:1,name:"يوم ١",day:"الأحد",color:"#7C3AED",light:"#EDE9FE",dark:"#5B21B6",title:"كتف + جانبيات الأرجل",time:"~58 د",warmup:[{name:"إليبتيكال",sets:"10 د",note:"Zone 2"},{name:"Pull Apart",sets:"3×15",note:"مقاومة خفيفة"},{name:"External Rotation",sets:"3×15",note:"كابل / مطاط"},{name:"W-T-Y ركوع",sets:"2×10",note:"بدون وزن"}],blocks:[{label:"A",type:"PHA",rest:"75 ث",note:"كتف خلفي ↔ أبداكتور",exercises:[{id:"A1",name:"Reverse Fly",target:"كتف خلفي + Rhomboids",equip:"آلة",sets:3,reps:15,note:"ابدأ بوزن خفيف"},{id:"A2",name:"Hip Abductor",target:"أبداكتور",equip:"آلة",sets:3,reps:15,def:"40"}]},{label:"B",type:"PHA",rest:"75 ث",note:"كتف جانبي ↔ أداكتور",exercises:[{id:"B1",name:"Lateral Raise",target:"كتف جانبي",equip:"آلة",sets:3,reps:12,def:"8"},{id:"B2",name:"Adductor Machine",target:"أداكتور",equip:"آلة",sets:3,reps:15,def:"40"}]},{label:"C",type:"منفرد",rest:"60 ث",note:"كتف أمامي",exercises:[{id:"C1",name:"Overhead Press",target:"كتف أمامي",equip:"دمبل",sets:3,reps:12,def:"4",note:"⚠️ لا يتجاوز مستوى الكتف"}]}]},{id:2,name:"يوم ٢",day:"الثلاثاء",color:"#059669",light:"#D1FAE5",dark:"#065F46",title:"ظهر + بايسبس + خلفيات",time:"~57 د",warmup:[{name:"إليبتيكال",sets:"10 د",note:"Zone 2"},{name:"Cat-Cow",sets:"2×10",note:"ببطء"},{name:"Bird Dog",sets:"2×10",note:"تثبيت الظهر"}],blocks:[{label:"A",type:"PHA",rest:"75 ث",note:"لات ↔ هامسترينج",exercises:[{id:"A1",name:"Lat Pulldown",target:"لات + بايسبس ثانوي",equip:"Pull Down Machine",sets:3,reps:12,def:"35"},{id:"A2",name:"Leg Curl",target:"هامسترينج",equip:"آلة مستلقي",sets:3,reps:12,def:"30"}]},{label:"B",type:"PHA",rest:"75 ث",note:"وسط الظهر ↔ خلفيات",exercises:[{id:"B1",name:"Low Row",target:"وسط الظهر + Rhomboids",equip:"Low Row Machine",sets:3,reps:12,def:"35"},{id:"B2",name:"RDL",target:"هامسترينج + جلوت",equip:"دمبل",sets:3,reps:12,def:"20",note:"⚠️ ظهر مستقيم"}]},{label:"C",type:"منفرد",rest:"60 ث",note:"بايسبس",exercises:[{id:"C1",name:"Seated Bicep Curl (أحادي)",target:"بايسبس كامل",equip:"آلة جالس",sets:3,reps:12,note:"ابدأ بالأضعف"},{id:"C2",name:"Preacher Curl",target:"رأس قصير",equip:"آلة Preacher",sets:3,reps:12,note:"ببطء في النزول"}]}]},{id:3,name:"يوم ٣",day:"الخميس",color:"#2563EB",light:"#DBEAFE",dark:"#1E3A5F",title:"صدر + ترايسبس + أماميات + عجل",time:"~54 د",warmup:[{name:"إليبتيكال",sets:"10 د",note:"Zone 2"},{name:"Pull Apart",sets:"3×15",note:"تحضير الكتف"},{name:"Dead Bug",sets:"2×8",note:"تثبيت الكور"},{name:"Bar أرضي",sets:"2×10",note:"⚡ يسخّن الصدر + ترايسبس"}],blocks:[{label:"A",type:"PHA",rest:"75 ث",note:"صدر ↔ كواد",exercises:[{id:"A1",name:"Chest Press",target:"صدر أوسط",equip:"آلة",sets:3,reps:12,def:"20"},{id:"A2",name:"Leg Press",target:"كواد + جلوت",equip:"آلة",sets:3,reps:15,def:"40"}]},{label:"B",type:"PHA",rest:"75 ث",note:"صدر عزل ↔ كواد عزل",exercises:[{id:"B1",name:"Pectoral Machine",target:"صدر أوسط + سفلي",equip:"آلة",sets:3,reps:15,def:"20"},{id:"B2",name:"Leg Extension",target:"كواد عزل",equip:"آلة",sets:3,reps:15,def:"40"}]},{label:"C",type:"منفرد",rest:"45 ث",note:"ترايسبس",exercises:[{id:"C1",name:"Pushdown",target:"ترايسبس",equip:"كابل",sets:3,reps:15,def:"15"},{id:"C2",name:"OH Extension",target:"ترايسبس رأس طويل",equip:"دمبل",sets:3,reps:12,def:"4"}]},{label:"D",type:"Finisher",rest:"45 ث",note:"عجل",exercises:[{id:"D1",name:"Calf Raise",target:"عجل + نعل",equip:"حر",sets:3,reps:"20",isT:true,note:"ببطء في النزول"}]}]},{id:4,name:"يوم ٤",day:"السبت",color:"#D97706",light:"#FEF3C7",dark:"#92400E",title:"كور كامل",time:"~56 د",warmup:[{name:"إليبتيكال",sets:"10 د",note:"Zone 2"},{name:"Dead Bug",sets:"2×8",note:"تنشيط الكور"},{name:"Glute Bridge",sets:"2×15",note:"بدون وزن"}],blocks:[{label:"A",type:"منفرد",rest:"45 ث",note:"أمامي",exercises:[{id:"A1",name:"Weighted Crunch",target:"Rectus Abdominis",equip:"دمبل",sets:3,reps:15},{id:"A2",name:"Plank",target:"Rectus + Transverse",equip:"بدون أجهزة",sets:3,reps:"40 ث",isT:true}]},{label:"B",type:"منفرد",rest:"45 ث",note:"عميق + جانبي",exercises:[{id:"B1",name:"Pallof Press",target:"Transverse + Obliques",equip:"كابل",sets:3,reps:12,def:"20"},{id:"B2",name:"Side Plank",target:"Obliques",equip:"بدون أجهزة",sets:3,reps:"30 ث",isT:true,note:"كل جهة"}]},{label:"C",type:"منفرد",rest:"45 ث",note:"جانبي + ديناميكي",exercises:[{id:"C1",name:"Woodchop",target:"Obliques + Transverse",equip:"كابل",sets:3,reps:12,def:"10"},{id:"C2",name:"Shoulder Tap",target:"Transverse + Rectus",equip:"بدون أجهزة",sets:3,reps:"8 لكل جهة",isT:true}]},{label:"D",type:"Finisher",rest:"60 ث",note:"كور كامل",exercises:[{id:"D1",name:"Farmer Carry",target:"Transverse + Erector + Traps",equip:"دمبل",sets:3,reps:"25 م",isT:true,def:"15",note:"⚠️ ظهر مستقيم"}]}]}];

let curDay=null,wkLog={};
const td=()=>new Date().toISOString().split('T')[0];
const lk=(d,date)=>`wk_d${d}_${date}`;
const loadLog=d=>{try{const v=localStorage.getItem(lk(d,td()));return v?JSON.parse(v):{}}catch{return{}}};
const saveLog=(d,l)=>{try{localStorage.setItem(lk(d,td()),JSON.stringify(l))}catch{}};
const allLogs=()=>{const r=[];try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('wk_')){try{r.push({key:k,data:JSON.parse(localStorage.getItem(k))})}catch{}}}}catch{}return r};
const cntDone=l=>Object.values(l).filter(s=>s&&s.done).length;
const totSets=d=>d.blocks.reduce((a,b)=>a+b.exercises.reduce((c,e)=>c+e.sets,0),0);

function renderHome(){
  const logs=allLogs();
  document.getElementById('stats-row').innerHTML=`
    <div class="streak-chip"><div class="streak-val">${logs.length}</div><div class="streak-lbl">جلسة</div></div>
    <div class="streak-chip"><div class="streak-val">${logs.reduce((a,l)=>a+cntDone(l.data),0)}</div><div class="streak-lbl">سيت مكتمل</div></div>
    <div class="streak-chip"><div class="streak-val" dir="ltr">130-150</div><div class="streak-lbl">bpm</div></div>
    <div class="streak-chip"><div class="streak-val" dir="ltr">60 د</div><div class="streak-lbl">الوقت</div></div>`;
  const list=document.getElementById('days-list');
  list.innerHTML='';
  DAYS.forEach(day=>{
    const tl=loadLog(day.id);
    const done=cntDone(tl);
    const total=totSets(day);
    const pct=total>0?Math.round(done/total*100):0;
    const past=logs.filter(l=>l.key.startsWith(`wk_d${day.id}_`)).length;
    const full=pct===100&&total>0;
    list.innerHTML+=`<div class="day-card" onclick="openDay(${day.id})">
      <div class="day-card-top">
        <span class="day-pill" style="background:${day.light};color:${day.dark}">${day.day} · ${day.name}</span>
        <div class="check-circle" style="${full?`background:${day.color};border-color:${day.color};color:white`:''}">
          ${full?'✓':''}
        </div>
      </div>
      <div class="day-card-title">${day.title}</div>
      <div class="day-card-meta">
        <span>⏱ ${day.time}</span>
        <span>📋 ${past} جلسة</span>
        ${pct>0?`<span style="color:${day.color}">✅ ${pct}% اليوم</span>`:''}
      </div>
      <div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:${day.color}"></div></div>
    </div>`;
  });
  // Show install banner on iOS Safari if not installed
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone=window.navigator.standalone;
  const banner=document.getElementById('install-banner');
  if(isIOS&&!isStandalone)banner.classList.remove('hidden');
  else banner.classList.add('hidden');
}

function showInstallGuide(){
  showToast('اضغط زر المشاركة ↑ ثم "Add to Home Screen"');
}

function openDay(id){
  curDay=DAYS.find(d=>d.id===id);
  wkLog=loadLog(id);
  document.getElementById('wk-title').textContent=`${curDay.day} · ${curDay.name}`;
  document.getElementById('wk-sub').textContent=curDay.title;
  renderWorkout();
  showScreen('workout');
}

function goHome(){showScreen('home');renderHome()}

function renderWorkout(){
  let h='';
  h+=`<div class="sec-lbl" style="margin-top:12px">الإحماء</div><div class="wu-card">`;
  curDay.warmup.forEach(w=>{h+=`<div class="wu-row"><div><div class="wu-name">${w.name}</div><div class="wu-note">${w.note}</div></div><span class="wu-sets">${w.sets}</span></div>`});
  h+='</div>';
  h+=`<div class="sec-lbl">التمارين</div>`;
  curDay.blocks.forEach(blk=>{
    const tc=blk.type==='PHA'?'#831843':blk.type==='Finisher'?'#991b1b':'#374151';
    const tb=blk.type==='PHA'?'#FCE7F3':blk.type==='Finisher'?'#FEE2E2':'#F3F4F6';
    h+=`<div class="block-wrap"><div class="block-hdr">
      <span class="block-lbl" style="background:${tb};color:${tc}">بلوك ${blk.label}</span>
      <span class="block-lbl" style="background:${tb};color:${tc}">${blk.type}</span>
      <span class="block-note">${blk.note}</span>
      <span class="block-rest">⏱ ${blk.rest}</span>
    </div><div class="block-body">`;
    blk.exercises.forEach((ex,i)=>{
      if(i>0&&blk.type==='PHA')h+=`<div class="pha-sep">↕ PHA ↕</div>`;
      const ek=`${curDay.id}_${ex.id}`;
      h+=`<div class="ex-item"><div class="ex-top"><div>
        <div class="ex-id" style="color:${curDay.color}">${ex.id}</div>
        <div class="ex-name">${ex.name}</div>
        <div class="ex-target">${ex.target}</div>
        <span class="ex-equip">📦 ${ex.equip}</span>
        ${ex.note?`<div class="ex-warn">${ex.note}</div>`:''}
      </div><div class="ex-prescribed" style="color:${curDay.color}">${ex.sets}×${ex.reps}</div></div>
      <div class="sets-wrap">`;
      for(let s=1;s<=ex.sets;s++){
        const sk=`${ek}_s${s}`;
        const sv=wkLog[sk]||{};
        const done=sv.done||false;
        const w=sv.weight||(ex.def||'');
        h+=`<div class="set-row ${done?'done-row':''}" id="r_${sk}">
          <span class="set-n">سيت ${s}</span>
          <div class="set-fields">`;
        if(!ex.isT){
          h+=`<div class="field-group">
            <input class="set-inp" type="number" inputmode="decimal" placeholder="kg" value="${w}"
              oninput="logW('${sk}',this.value)" style="border-color:${done?'#86EFAC':'var(--border)'}">
            <span class="field-lbl">وزن kg</span>
          </div>
          <div class="field-group">
            <input class="set-inp ro" type="number" value="${ex.reps}" readonly>
            <span class="field-lbl">تكرار</span>
          </div>`;
        }else{
          h+=`<div style="flex:1;font-size:12px;color:var(--muted);padding:6px 0">${ex.reps}</div>`;
        }
        h+=`</div><button class="done-btn ${done?'is-done':''}" id="b_${sk}" onclick="tDone('${sk}')"
          style="${done?`background:${curDay.color};border-color:${curDay.color}`:''}">
          ${done?'✓':'○'}</button></div>`;
      }
      h+=`</div></div>`;
    });
    h+=`</div></div>`;
  });
  document.getElementById('wk-content').innerHTML=h;
  updSave();
}

function logW(sk,v){if(!wkLog[sk])wkLog[sk]={};wkLog[sk].weight=v}
function tDone(sk){
  if(!wkLog[sk])wkLog[sk]={};
  wkLog[sk].done=!wkLog[sk].done;
  const done=wkLog[sk].done;
  const row=document.getElementById(`r_${sk}`);
  const btn=document.getElementById(`b_${sk}`);
  row.classList.toggle('done-row',done);
  btn.classList.toggle('is-done',done);
  btn.style.background=done?curDay.color:'white';
  btn.style.borderColor=done?curDay.color:'var(--border)';
  btn.textContent=done?'✓':'○';
  const inp=row.querySelector('.set-inp:not(.ro)');
  if(inp)inp.style.borderColor=done?'#86EFAC':'var(--border)';
  updSave();
}
function updSave(){
  if(!curDay)return;
  const total=totSets(curDay),done=cntDone(wkLog);
  const btn=document.getElementById('save-btn');
  const full=done===total&&total>0;
  btn.textContent=full?'🎉 تمرين مكتمل — حفظ':`💾 حفظ (${done}/${total} سيت)`;
  btn.style.background=full?curDay.light:curDay.color;
  btn.style.color=full?curDay.dark:'white';
}
function saveWorkout(){
  document.querySelectorAll('.set-inp:not(.ro)').forEach(inp=>{
    const sk=inp.closest('.set-row').id.replace('r_','');
    if(!wkLog[sk])wkLog[sk]={};
    wkLog[sk].weight=inp.value;
  });
  saveLog(curDay.id,wkLog);
  showToast('✅ تم الحفظ!');
  renderHome();
}
function renderHistory(){
  const logs=allLogs().sort((a,b)=>b.key.localeCompare(a.key));
  const list=document.getElementById('hist-list');
  if(!logs.length){list.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div>لا يوجد سجل بعد<br>ابدأ تدريبك الأول!</div></div>`;return}
  list.innerHTML='';
  logs.forEach(l=>{
    const parts=l.key.split('_');
    const dayId=parseInt(parts[1].replace('d',''));
    const date=parts[2];
    const day=DAYS.find(d=>d.id===dayId);
    if(!day)return;
    const done=cntDone(l.data);
    const total=totSets(day);
    const exMap={};
    Object.entries(l.data).forEach(([sk,sv])=>{
      const p=sk.split('_');
      const eid=p[1];
      if(!exMap[eid])exMap[eid]={weights:[],done:0};
      if(sv.done)exMap[eid].done++;
      if(sv.weight)exMap[eid].weights.push(sv.weight);
    });
    let exH='';
    day.blocks.forEach(blk=>blk.exercises.forEach(ex=>{
      const ed=exMap[ex.id];if(!ed)return;
      const wStr=ed.weights.length?[...new Set(ed.weights)].map(w=>`${w}kg`).join('/'):'BW';
      exH+=`<div class="hist-ex"><span class="hist-ex-name">${ex.name}</span>
        <span class="hist-sets"><span class="hist-pill">${ed.done}/${ex.sets}✓</span><span class="hist-pill">${wStr}</span></span></div>`;
    }));
    list.innerHTML+=`<div class="hist-card">
      <div class="hist-date">${date}</div>
      <div class="hist-day" style="color:${day.color}">${day.day} · ${day.name} · ${done}/${total} سيت</div>
      <div>${exH}</div></div>`;
  });
}
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  if(tab==='home'){showScreen('home');renderHome()}
  else{showScreen('history');renderHistory()}
}
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(`screen-${name}`).classList.remove('hidden');
  document.getElementById(`screen-${name}`).scrollTop=0;
  document.getElementById('tab-bar').style.display=name==='workout'?'none':'flex';
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}

renderHome();
</script>
</body>
</html>
