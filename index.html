<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="تدريبي">
<meta name="theme-color" content="#7C3AED">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>تدريبي</title>
<style>
:root{--bg:#F5F5F7;--card:#FFFFFF;--border:#E5E7EB;--text:#111827;--muted:#6B7280;--light:#F3F4F6;--accent:#7C3AED}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;display:flex;flex-direction:column}
#app{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;transition:transform .28s cubic-bezier(.4,0,.2,1),opacity .28s}
.screen.hidden{transform:translateX(-100%);opacity:0;pointer-events:none}
.hdr{background:rgba(255,255,255,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:.5px solid var(--border);padding:env(safe-area-inset-top,0) 0 0;position:sticky;top:0;z-index:50}
.hdr-inner{padding:13px 18px 11px;display:flex;align-items:center;gap:12px}
.hdr h2{font-size:17px;font-weight:700;flex:1;text-align:center;color:var(--text)}
.hdr-sub{font-size:11px;color:var(--muted);text-align:center;padding:0 18px 9px}
.back-btn{width:32px;height:32px;border-radius:50%;background:var(--light);border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--muted)}
.home-hero{padding:calc(env(safe-area-inset-top,0) + 22px) 20px 6px}
.home-hero h1{font-size:30px;font-weight:800;letter-spacing:-.5px}
.home-hero p{font-size:13px;color:var(--muted);margin-top:4px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 16px}
.stat-card{background:var(--card);border-radius:14px;padding:12px 14px;text-align:center;border:1px solid var(--border)}
.stat-val{font-size:22px;font-weight:800;color:var(--text);direction:ltr;display:block}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px;display:block}
.days-list{padding:4px 16px calc(env(safe-area-inset-bottom,0) + 90px);display:flex;flex-direction:column;gap:10px}
.day-card{background:var(--card);border-radius:18px;border:1.5px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .12s}
.day-card:active{transform:scale(.98)}
.day-card-top{padding:14px 16px 8px;display:flex;justify-content:space-between;align-items:center}
.day-pill{font-size:12px;font-weight:700;padding:5px 12px;border-radius:10px}
.day-card-title{font-size:17px;font-weight:700;padding:0 16px 4px}
.day-card-meta{font-size:11px;color:var(--muted);padding:0 16px 14px;display:flex;gap:14px;flex-wrap:wrap}
.pbar{height:3px;background:var(--light)}
.pbar-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.check-circle{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0}
.sec-lbl{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.5px;margin:14px 18px 8px;display:flex;align-items:center;gap:8px}
.sec-lbl::after{content:'';flex:1;height:.5px;background:var(--border)}
.wu-card{margin:0 16px;background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden}
.wu-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:.5px solid var(--light)}
.wu-row:last-child{border-bottom:none}
.wu-name{font-size:13px;font-weight:600}
.wu-note{font-size:10px;color:var(--muted);margin-top:1px}
.wu-badge{font-size:12px;font-weight:700;background:var(--light);padding:3px 10px;border-radius:8px;white-space:nowrap}
.block-wrap{margin:0 16px 10px}
.block-hdr{display:flex;align-items:center;gap:5px;padding:9px 13px;background:var(--card);border-radius:14px 14px 0 0;border:1px solid var(--border);border-bottom:.5px solid var(--light);flex-wrap:wrap}
.block-lbl{font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px}
.block-note{font-size:11px;color:var(--muted);flex:1;min-width:50px}
.block-rest-badge{font-size:10px;background:var(--light);color:var(--muted);padding:3px 8px;border-radius:7px;white-space:nowrap}
.block-body{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 14px 14px;overflow:hidden}
.pha-sep{background:var(--light);text-align:center;padding:4px;font-size:10px;color:var(--muted);border-top:.5px solid var(--border);border-bottom:.5px solid var(--border)}
.ex-item{padding:13px 14px;border-bottom:.5px solid var(--light)}
.ex-item:last-child{border-bottom:none}
.ex-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.ex-id{font-size:10px;font-weight:700;margin-bottom:2px}
.ex-name{font-size:15px;font-weight:700}
.ex-target{font-size:11px;color:var(--muted);margin-top:2px}
.ex-equip{font-size:10px;background:var(--light);padding:2px 8px;border-radius:6px;display:inline-block;margin-top:4px;color:var(--muted)}
.ex-warn{font-size:10px;color:#DC2626;font-weight:600;margin-top:4px}
.ex-prescribed{font-size:13px;font-weight:800;white-space:nowrap;padding-right:4px}
.sets-wrap{display:flex;flex-direction:column;gap:5px}
.set-row{display:flex;align-items:center;gap:8px;background:var(--light);border-radius:10px;padding:8px 10px;transition:background .2s}
.set-row.done-row{background:#F0FDF4}
.set-n{font-size:11px;font-weight:600;color:var(--muted);min-width:28px}
.set-fields{display:flex;gap:8px;flex:1;align-items:flex-start}
.field-g{display:flex;flex-direction:column;align-items:center;gap:2px}
.field-lbl{font-size:9px;color:var(--muted)}
.set-inp{border:1.5px solid var(--border);border-radius:9px;padding:7px 4px;font-size:15px;font-weight:700;text-align:center;width:64px;background:white;color:var(--text);font-family:inherit;-webkit-appearance:none}
.set-inp:focus{outline:none}
.set-inp.ro{background:var(--light);color:var(--muted);border-color:transparent;font-size:13px}
.hint-box{font-size:10px;text-align:center;margin-top:2px;padding:2px 5px;border-radius:5px;white-space:nowrap}
.hint-last{color:#6B7280;background:#F3F4F6}
.hint-up{color:#D97706;background:#FEF3C7}
.hint-ok{color:#059669;background:#D1FAE5}
.done-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:white;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0}
.done-btn.is-done{color:white;border-color:transparent}
.wk-progress{height:3px;background:var(--light);position:sticky;top:64px;z-index:40}
.wk-progress-fill{height:100%;transition:width .4s;border-radius:0 2px 2px 0}
#rest-timer{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(17,24,39,.93);color:white;border-radius:20px;padding:14px 22px;display:flex;align-items:center;gap:12px;z-index:200;opacity:0;transition:all .3s;pointer-events:none;backdrop-filter:blur(10px);min-width:220px}
#rest-timer.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all}
.timer-ring{width:44px;height:44px;position:relative;flex-shrink:0}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring circle{fill:none;stroke-linecap:round;transition:stroke-dashoffset .9s linear}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800}
.timer-label{font-size:13px;font-weight:600}
.timer-sub{font-size:11px;opacity:.7;margin-top:2px}
.timer-skip{background:rgba(255,255,255,.15);border:none;border-radius:10px;padding:6px 12px;color:white;font-size:12px;cursor:pointer;font-family:inherit;margin-right:auto}
.save-bar{padding:10px 16px calc(env(safe-area-inset-bottom,0) + 10px);background:rgba(245,245,247,.96);backdrop-filter:blur(10px);border-top:.5px solid var(--border)}
.save-btn{width:100%;padding:15px;border-radius:14px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .12s,background .2s,color .2s}
.save-btn:active{transform:scale(.98)}
.tab-bar{background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-top:.5px solid var(--border);padding:8px 0 calc(env(safe-area-inset-bottom,0) + 6px);display:flex;position:sticky;bottom:0;z-index:50}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 0}
.tab-icon{font-size:22px}
.tab-label{font-size:10px;color:var(--muted)}
.tab-btn.active .tab-label{font-weight:700;color:#7C3AED}
/* History */
.hist-list{padding:8px 16px calc(env(safe-area-inset-bottom,0) + 90px);display:flex;flex-direction:column;gap:10px}
.hist-top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 0}
.export-btn{background:#7C3AED;color:white;border:none;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}
.hist-card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:14px 16px}
.hist-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.hist-date-main{font-size:13px;font-weight:700;color:var(--text)}
.hist-date-sub{font-size:11px;color:var(--muted);margin-top:2px;direction:ltr;text-align:right}
.hist-day-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;display:inline-block;margin-top:5px}
.hist-progress{font-size:11px;color:var(--muted);margin-top:3px}
.hist-del{background:var(--light);border:none;border-radius:8px;padding:7px 10px;font-size:13px;cursor:pointer;color:#DC2626}
.hist-exercises{display:flex;flex-direction:column;gap:4px}
.hist-ex{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:4px 0;border-bottom:.5px solid var(--light)}
.hist-ex:last-child{border-bottom:none}
.hist-ex-name{color:var(--muted);flex:1}
.hist-pills{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.hist-pill{font-size:10px;font-weight:600;background:var(--light);padding:2px 7px;border-radius:6px}
/* Progress screen */
.prog-list{padding:8px 16px calc(env(safe-area-inset-bottom,0) + 90px)}
.prog-day-sel{display:flex;gap:6px;padding:8px 0 12px;overflow-x:auto;scrollbar-width:none}
.prog-day-sel::-webkit-scrollbar{display:none}
.prog-day-btn{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;color:var(--muted)}
.prog-day-btn.active{border-color:var(--accent);color:var(--accent);background:#EDE9FE}
.prog-ex-card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:14px 16px;margin-bottom:10px}
.prog-ex-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.prog-ex-name{font-size:14px;font-weight:700}
.prog-ex-sub{font-size:11px;color:var(--muted);margin-top:2px}
.prog-stats{display:flex;gap:8px;margin-top:4px}
.prog-stat{font-size:10px;padding:3px 9px;border-radius:8px;font-weight:600}
.prog-chart{width:100%;height:100px;margin-top:8px}
.no-data{text-align:center;padding:30px 0;color:var(--muted);font-size:13px}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:52px;margin-bottom:14px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:#111;color:#fff;padding:11px 22px;border-radius:20px;font-size:13px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.install-banner{margin:0 16px 8px;background:#7C3AED;border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer}
.install-banner.hidden{display:none}
.install-text{flex:1;color:white;font-size:12px;font-weight:600}
.install-sub{font-size:10px;color:rgba(255,255,255,.75);margin-top:2px}
.install-btn{background:white;color:#7C3AED;border:none;padding:7px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="app">
  <div id="screen-home" class="screen">
    <div class="home-hero">
      <h1>تدريبي 💪</h1>
      <p>ريكومب / PHA — حرق الدهون + شد</p>
    </div>
    <div id="install-banner" class="install-banner hidden" onclick="showInstallGuide()">
      <div class="install-text">ثبّت التطبيق على شاشتك<div class="install-sub">يشتغل بدون إنترنت</div></div>
      <button class="install-btn">تثبيت</button>
    </div>
    <div class="stats-grid" id="stats-grid"></div>
    <div class="sec-lbl">الجدول</div>
    <div class="days-list" id="days-list"></div>
  </div>
  <div id="screen-workout" class="screen hidden">
    <div class="hdr">
      <div class="hdr-inner">
        <button class="back-btn" onclick="goHome()">←</button>
        <h2 id="wk-title"></h2>
        <div style="width:32px"></div>
      </div>
      <div class="hdr-sub" id="wk-sub"></div>
    </div>
    <div class="wk-progress"><div class="wk-progress-fill" id="wk-pbar"></div></div>
    <div id="wk-content"></div>
    <div class="save-bar">
      <button class="save-btn" id="save-btn" onclick="saveWorkout()">💾 حفظ التدريب</button>
    </div>
  </div>
  <div id="screen-progress" class="screen hidden">
    <div class="hdr"><div class="hdr-inner"><h2>التقدم 📈</h2></div></div>
    <div class="prog-list">
      <div class="prog-day-sel" id="prog-day-sel"></div>
      <div id="prog-content"></div>
    </div>
  </div>
  <div id="screen-history" class="screen hidden">
    <div class="hdr"><div class="hdr-inner"><h2>السجل 📊</h2></div></div>
    <div class="hist-top-bar">
      <span style="font-size:13px;font-weight:600;color:var(--muted)">جلساتك السابقة</span>
      <button class="export-btn" onclick="exportCSV()">⬇ تصدير CSV</button>
    </div>
    <div class="hist-list" id="hist-list"></div>
  </div>
</div>
<div class="tab-bar" id="tab-bar">
  <button class="tab-btn active" id="tab-home" onclick="switchTab('home')"><span class="tab-icon">🏠</span><span class="tab-label">الرئيسية</span></button>
  <button class="tab-btn" id="tab-progress" onclick="switchTab('progress')"><span class="tab-icon">📈</span><span class="tab-label">التقدم</span></button>
  <button class="tab-btn" id="tab-history" onclick="switchTab('history')"><span class="tab-icon">📊</span><span class="tab-label">السجل</span></button>
</div>
<div id="rest-timer">
  <div class="timer-ring">
    <svg width="44" height="44" viewBox="0 0 44 44">
      <circle cx="22" cy="22" r="18" stroke="rgba(255,255,255,.2)" stroke-width="3"/>
      <circle id="timer-arc" cx="22" cy="22" r="18" stroke="white" stroke-width="3" stroke-dasharray="113" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-num" id="timer-num">75</div>
  </div>
  <div style="flex:1"><div class="timer-label">وقت الراحة</div><div class="timer-sub" id="timer-sub">استرح بين الجولات</div></div>
  <button class="timer-skip" onclick="skipTimer()">تخطي ⏭</button>
</div>
<div class="toast" id="toast"></div>
<script>
const DAYS=[
  {id:1,color:"#7C3AED",light:"#EDE9FE",dark:"#5B21B6",title:"يوم ١",subtitle:"كتف + جانبيات الأرجل",time:"~58 د",
   warmup:[{name:"إليبتيكال",sets:"10 د",note:"Zone 2"},{name:"Pull Apart",sets:"3×15",note:"مقاومة خفيفة"},{name:"External Rotation",sets:"3×15",note:"كابل / مطاط"},{name:"W-T-Y ركوع",sets:"2×10",note:"بدون وزن"}],
   blocks:[
    {label:"A",type:"PHA",rest:75,note:"كتف خلفي ↔ أبداكتور",exercises:[{id:"A1",name:"Reverse Fly",target:"كتف خلفي + Rhomboids",equip:"آلة",sets:3,reps:15,note:"ابدأ بوزن خفيف"},{id:"A2",name:"Hip Abductor",target:"أبداكتور",equip:"آلة",sets:3,reps:15}]},
    {label:"B",type:"PHA",rest:75,note:"كتف جانبي ↔ أداكتور",exercises:[{id:"B1",name:"Lateral Raise",target:"كتف جانبي",equip:"آلة",sets:3,reps:12},{id:"B2",name:"Adductor Machine",target:"أداكتور",equip:"آلة",sets:3,reps:15}]},
    {label:"C",type:"منفرد",rest:60,note:"كتف أمامي",exercises:[{id:"C1",name:"Overhead Press",target:"كتف أمامي",equip:"دمبل",sets:3,reps:12,note:"⚠️ لا يتجاوز مستوى الكتف"}]}]},
  {id:2,color:"#059669",light:"#D1FAE5",dark:"#065F46",title:"يوم ٢",subtitle:"ظهر + بايسبس + خلفيات الأرجل",time:"~57 د",
   warmup:[{name:"إليبتيكال",sets:"10 د",note:"Zone 2"},{name:"Cat-Cow",sets:"2×10",note:"ببطء"},{name:"Bird Dog",sets:"2×10",note:"تثبيت الظهر"}],
   blocks:[
    {label:"A",type:"PHA",rest:75,note:"لات ↔ هامسترينج",exercises:[{id:"A1",name:"Lat Pulldown",target:"لات + بايسبس ثانوي",equip:"Pull Down Machine",sets:3,reps:12},{id:"A2",name:"Leg Curl",target:"هامسترينج",equip:"آلة مستلقي",sets:3,reps:12}]},
    {label:"B",type:"PHA",rest:75,note:"وسط الظهر ↔ خلفيات",exercises:[{id:"B1",name:"Low Row",target:"وسط الظهر + Rhomboids",equip:"Low Row Machine",sets:3,reps:12},{id:"B2",name:"RDL",target:"هامسترينج + جلوت",equip:"دمبل",sets:3,reps:12,note:"⚠️ ظهر مستقيم"}]},
    {label:"C",type:"منفرد",rest:60,note:"بايسبس",exercises:[{id:"C1",name:"Seated Bicep Curl (أحادي)",target:"بايسبس كامل",equip:"آلة جالس",sets:3,reps:12,note:"ابدأ بالأضعف"},{id:"C2",name:"Preacher Curl",target:"رأس قصير",equip:"آلة Preacher",sets:3,reps:12,note:"ببطء في النزول"}]}]},
  {id:3,color:"#2563EB",light:"#DBEAFE",dark:"#1E3A5F",title:"يوم ٣",subtitle:"صدر + ترايسبس + أماميات + بطات",time:"~54 د",
   warmup:[{name:"إليبتيكال",sets:"10 د",note:"Zone 2"},{name:"Pull Apart",sets:"3×15",note:"تحضير الكتف"},{name:"Dead Bug",sets:"2×8",note:"تثبيت الكور"},{name:"Bar أرضي",sets:"2×10",note:"⚡ يسخّن الصدر + ترايسبس"}],
   blocks:[
    {label:"A",type:"PHA",rest:75,note:"صدر ↔ كواد",exercises:[{id:"A1",name:"Chest Press",target:"صدر أوسط",equip:"آلة",sets:3,reps:12},{id:"A2",name:"Leg Press",target:"كواد + جلوت",equip:"آلة",sets:3,reps:15}]},
    {label:"B",type:"PHA",rest:75,note:"صدر عزل ↔ كواد عزل",exercises:[{id:"B1",name:"Pectoral Machine",target:"صدر أوسط + سفلي",equip:"آلة",sets:3,reps:15},{id:"B2",name:"Leg Extension",target:"كواد عزل",equip:"آلة",sets:3,reps:15}]},
    {label:"C",type:"منفرد",rest:45,note:"ترايسبس",exercises:[{id:"C1",name:"Pushdown",target:"ترايسبس",equip:"كابل",sets:3,reps:15},{id:"C2",name:"OH Extension",target:"ترايسبس رأس طويل",equip:"دمبل",sets:3,reps:12}]},
    {label:"D",type:"Finisher",rest:45,note:"بطات",exercises:[{id:"D1",name:"Calf Raise",target:"بطات — Gastrocnemius + Soleus",equip:"حر",sets:3,reps:"20",isT:true,note:"ببطء في النزول"}]}]},
  {id:4,color:"#D97706",light:"#FEF3C7",dark:"#92400E",title:"يوم ٤",subtitle:"كور كامل",time:"~56 د",
   warmup:[{name:"إليبتيكال",sets:"10 د",note:"Zone 2"},{name:"Dead Bug",sets:"2×8",note:"تنشيط الكور"},{name:"Glute Bridge",sets:"2×15",note:"بدون وزن"}],
   blocks:[
    {label:"A",type:"منفرد",rest:45,note:"أمامي",exercises:[{id:"A1",name:"Weighted Crunch",target:"Rectus Abdominis",equip:"دمبل",sets:3,reps:15},{id:"A2",name:"Plank",target:"Rectus + Transverse",equip:"بدون أجهزة",sets:3,reps:"40 ث",isT:true}]},
    {label:"B",type:"منفرد",rest:45,note:"عميق + جانبي",exercises:[{id:"B1",name:"Pallof Press",target:"Transverse + Obliques",equip:"كابل",sets:3,reps:12},{id:"B2",name:"Side Plank",target:"Obliques",equip:"بدون أجهزة",sets:3,reps:"30 ث",isT:true,note:"كل جهة"}]},
    {label:"C",type:"منفرد",rest:45,note:"جانبي + ديناميكي",exercises:[{id:"C1",name:"Woodchop",target:"Obliques + Transverse",equip:"كابل",sets:3,reps:12},{id:"C2",name:"Shoulder Tap",target:"Transverse + Rectus",equip:"بدون أجهزة",sets:3,reps:"8 لكل جهة",isT:true}]},
    {label:"D",type:"Finisher",rest:60,note:"كور كامل",exercises:[{id:"D1",name:"Farmer Carry",target:"Transverse + Erector + Traps",equip:"دمبل",sets:3,reps:"25 م",isT:true,note:"⚠️ ظهر مستقيم"}]}]}
];

let curDay=null,wkLog={};
const td=()=>new Date().toISOString().split('T')[0];
const lk=(d,dt)=>`wk_d${d}_${dt}`;
const loadLog=d=>{try{const v=localStorage.getItem(lk(d,td()));return v?JSON.parse(v):{}}catch{return{}}};
const saveLog=(d,l)=>{try{localStorage.setItem(lk(d,td()),JSON.stringify(l))}catch{}};
const allLogs=()=>{const r=[];try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('wk_')){try{r.push({key:k,data:JSON.parse(localStorage.getItem(k))})}catch{}}}}catch{}return r};
const delLog=k=>{try{localStorage.removeItem(k)}catch{}};
const cntDone=l=>Object.values(l).filter(s=>s&&s.done).length;
const totSets=d=>d.blocks.reduce((a,b)=>a+b.exercises.reduce((c,e)=>c+e.sets,0),0);

function getExWeights(dayId,exId){
  const today=td();
  return allLogs()
    .filter(l=>l.key.startsWith(`wk_d${dayId}_`)&&!l.key.endsWith(today))
    .sort((a,b)=>b.key.localeCompare(a.key))
    .map(l=>{
      const ws=[];
      for(let s=1;s<=10;s++){
        const v=l.data[`${dayId}_${exId}_s${s}`];
        if(v&&v.weight)ws.push(parseFloat(v.weight));
      }
      const date=l.key.split('_').slice(2).join('_');
      const maxW=ws.length?Math.max(...ws):null;
      return{date,weight:maxW};
    })
    .filter(x=>x.weight!==null)
    .reverse();
}

function getHint(dayId,exId){
  const hist=getExWeights(dayId,exId);
  if(!hist.length)return null;
  const last=hist[hist.length-1].weight;
  if(hist.length>=2){
    const prev=hist[hist.length-2].weight;
    if(last>prev)return{type:'ok',text:`↑ تقدم! ${last}kg`,last};
    if(last===prev)return{type:'up',text:`↑ جرب ${last+2.5}kg`,last};
  }
  return{type:'last',text:`${last}kg`,last};
}

function fmtDate(dateStr){
  try{
    const d=new Date(dateStr+'T12:00:00');
    const arabic=d.toLocaleDateString('ar-SA',{weekday:'long',month:'long',day:'numeric'});
    const gregorian=d.toLocaleDateString('en-GB',{year:'numeric',month:'short',day:'numeric'});
    return{arabic,gregorian};
  }catch{return{arabic:dateStr,gregorian:dateStr}}
}

function renderHome(){
  const logs=allLogs();
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card"><span class="stat-val">${logs.length}</span><span class="stat-lbl">إجمالي الجلسات</span></div>
    <div class="stat-card"><span class="stat-val">${logs.reduce((a,l)=>a+cntDone(l.data),0)}</span><span class="stat-lbl">سيت مكتمل</span></div>
    <div class="stat-card"><span class="stat-val" style="font-size:15px">130–150</span><span class="stat-lbl">bpm هدف النبض</span></div>
    <div class="stat-card"><span class="stat-val" style="font-size:15px">60 د</span><span class="stat-lbl">الوقت المستهدف</span></div>`;
  const list=document.getElementById('days-list');
  list.innerHTML='';
  DAYS.forEach(day=>{
    const tl=loadLog(day.id);
    const done=cntDone(tl),total=totSets(day);
    const pct=total>0?Math.round(done/total*100):0;
    const past=logs.filter(l=>l.key.startsWith(`wk_d${day.id}_`)).length;
    const full=pct===100&&total>0;
    list.innerHTML+=`<div class="day-card" onclick="openDay(${day.id})">
      <div class="day-card-top">
        <span class="day-pill" style="background:${day.light};color:${day.dark}">${day.title}</span>
        <div class="check-circle" style="${full?`background:${day.color};border-color:${day.color};color:white`:''}">
          ${full?'✓':''}</div>
      </div>
      <div class="day-card-title">${day.subtitle}</div>
      <div class="day-card-meta">
        <span>⏱ ${day.time}</span><span>📋 ${past} جلسة</span>
        ${pct>0&&!full?`<span style="color:${day.color}">⬤ ${pct}%</span>`:''}
      </div>
      <div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:${day.color}"></div></div>
    </div>`;
  });
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  document.getElementById('install-banner').classList.toggle('hidden',!isIOS||!!window.navigator.standalone);
}

function showInstallGuide(){showToast('Safari: زر المشاركة ↑ ← Add to Home Screen')}

function openDay(id){
  curDay=DAYS.find(d=>d.id===id);
  wkLog=loadLog(id);
  document.getElementById('wk-title').textContent=curDay.title;
  document.getElementById('wk-sub').textContent=curDay.subtitle;
  document.getElementById('wk-pbar').style.background=curDay.color;
  renderWorkout();
  showScreen('workout');
}

function goHome(){stopTimer();showScreen('home');renderHome()}

function updProgress(){
  if(!curDay)return;
  const total=totSets(curDay),done=cntDone(wkLog);
  document.getElementById('wk-pbar').style.width=(total>0?Math.round(done/total*100):0)+'%';
  const btn=document.getElementById('save-btn');
  const full=done===total&&total>0;
  btn.textContent=full?'🎉 تمرين مكتمل — حفظ':`💾 حفظ التدريب (${done}/${total} سيت)`;
  btn.style.background=full?curDay.light:curDay.color;
  btn.style.color=full?curDay.dark:'white';
}

function renderWorkout(){
  let h='';
  h+=`<div class="sec-lbl" style="margin-top:12px">الإحماء</div><div class="wu-card">`;
  curDay.warmup.forEach(w=>{h+=`<div class="wu-row"><div><div class="wu-name">${w.name}</div><div class="wu-note">${w.note}</div></div><span class="wu-badge">${w.sets}</span></div>`});
  h+='</div><div class="sec-lbl">التمارين</div>';
  curDay.blocks.forEach(blk=>{
    const tc=blk.type==='PHA'?'#831843':blk.type==='Finisher'?'#991b1b':'#374151';
    const tb=blk.type==='PHA'?'#FCE7F3':blk.type==='Finisher'?'#FEE2E2':'#F3F4F6';
    h+=`<div class="block-wrap"><div class="block-hdr">
      <span class="block-lbl" style="background:${tb};color:${tc}">بلوك ${blk.label}</span>
      <span class="block-lbl" style="background:${tb};color:${tc}">${blk.type}</span>
      <span class="block-note">${blk.note}</span>
      <span class="block-rest-badge">⏱ ${blk.rest} ث</span>
    </div><div class="block-body">`;
    blk.exercises.forEach((ex,i)=>{
      if(i>0&&blk.type==='PHA')h+=`<div class="pha-sep">↕ PHA ↕</div>`;
      const ek=`${curDay.id}_${ex.id}`;
      const hint=!ex.isT?getHint(curDay.id,ex.id):null;
      h+=`<div class="ex-item"><div class="ex-top"><div>
        <div class="ex-id" style="color:${curDay.color}">${ex.id}</div>
        <div class="ex-name">${ex.name}</div>
        <div class="ex-target">${ex.target}</div>
        <span class="ex-equip">📦 ${ex.equip}</span>
        ${ex.note?`<div class="ex-warn">${ex.note}</div>`:''}
      </div><div class="ex-prescribed" style="color:${curDay.color}">${ex.sets}×${ex.reps}</div></div>
      <div class="sets-wrap">`;
      for(let s=1;s<=ex.sets;s++){
        const sk=`${ek}_s${s}`;
        const sv=wkLog[sk]||{};
        const done=sv.done||false;
        const w=sv.weight||'';
        h+=`<div class="set-row ${done?'done-row':''}" id="r_${sk}">
          <span class="set-n">سيت ${s}</span>
          <div class="set-fields">`;
        if(!ex.isT){
          const hintHtml=hint?`<span class="hint-box hint-${hint.type}" id="h_${sk}">${s===1?hint.text:hint.last+'kg'}</span>`:'';
          h+=`<div class="field-g">
            <input class="set-inp" type="number" inputmode="decimal" placeholder="" value="${w}"
              oninput="logW('${sk}',this.value)" style="border-color:${done?'#86EFAC':'var(--border)'}">
            <span class="field-lbl">وزن kg</span>
            ${hintHtml}
          </div>
          <div class="field-g">
            <input class="set-inp ro" type="number" value="${ex.reps}" readonly>
            <span class="field-lbl">تكرار</span>
          </div>`;
        }else{
          h+=`<div style="flex:1;font-size:12px;color:var(--muted);padding:6px 0">${ex.reps}</div>`;
        }
        h+=`</div>
          <button class="done-btn ${done?'is-done':''}" id="b_${sk}" onclick="tDone('${sk}',${blk.rest})"
            style="${done?`background:${curDay.color};border-color:${curDay.color}`:''}">
            ${done?'✓':'○'}</button></div>`;
      }
      h+=`</div></div>`;
    });
    h+=`</div></div>`;
  });
  document.getElementById('wk-content').innerHTML=h;
  updProgress();
}

function logW(sk,v){if(!wkLog[sk])wkLog[sk]={};wkLog[sk].weight=v}

function tDone(sk,rest){
  if(!wkLog[sk])wkLog[sk]={};
  wkLog[sk].done=!wkLog[sk].done;
  const done=wkLog[sk].done;
  const row=document.getElementById(`r_${sk}`);
  const btn=document.getElementById(`b_${sk}`);
  row.classList.toggle('done-row',done);
  btn.classList.toggle('is-done',done);
  btn.style.background=done?curDay.color:'white';
  btn.style.borderColor=done?curDay.color:'var(--border)';
  btn.textContent=done?'✓':'○';
  const inp=row.querySelector('.set-inp:not(.ro)');
  if(inp)inp.style.borderColor=done?'#86EFAC':'var(--border)';
  updProgress();
  if(done){if(navigator.vibrate)navigator.vibrate(40);startTimer(rest||75)}
  else stopTimer();
}

function saveWorkout(){
  document.querySelectorAll('.set-inp:not(.ro)').forEach(inp=>{
    const sk=inp.closest('.set-row').id.replace('r_','');
    if(!wkLog[sk])wkLog[sk]={};
    if(inp.value)wkLog[sk].weight=inp.value;
  });
  saveLog(curDay.id,wkLog);
  stopTimer();
  showToast('✅ تم الحفظ!');
  setTimeout(()=>goHome(),700);
}

// Timer
let timerInt=null,timerLeft=0,timerTotal=0;
function startTimer(secs){
  stopTimer();timerLeft=secs;timerTotal=secs;
  const el=document.getElementById('rest-timer');
  const numEl=document.getElementById('timer-num');
  const arc=document.getElementById('timer-arc');
  const circ=2*Math.PI*18;
  el.classList.add('show');
  document.getElementById('timer-sub').textContent=`استرح ${secs} ثانية`;
  function tick(){
    numEl.textContent=timerLeft;
    arc.style.strokeDashoffset=(1-timerLeft/timerTotal)*circ;
    if(timerLeft<=0){stopTimer();if(navigator.vibrate)navigator.vibrate([60,40,60]);showToast('⏱ انتهى وقت الراحة!');return}
    timerLeft--;
  }
  tick();timerInt=setInterval(tick,1000);
}
function stopTimer(){if(timerInt){clearInterval(timerInt);timerInt=null}document.getElementById('rest-timer').classList.remove('show')}
function skipTimer(){stopTimer();showToast('⏭ تخطيت الراحة')}

// Progress screen
let progDay=1;
function renderProgress(){
  const sel=document.getElementById('prog-day-sel');
  sel.innerHTML='';
  DAYS.forEach(d=>{
    sel.innerHTML+=`<button class="prog-day-btn ${d.id===progDay?'active':''}" 
      onclick="progDay=${d.id};renderProgress()" 
      style="${d.id===progDay?`border-color:${d.color};color:${d.color};background:${d.light}`:''}">
      ${d.title}</button>`;
  });
  const day=DAYS.find(d=>d.id===progDay);
  let h='';
  day.blocks.forEach(blk=>{
    blk.exercises.forEach(ex=>{
      if(ex.isT)return;
      const hist=getExWeights(day.id,ex.id);
      const pr=hist.length?Math.max(...hist.map(x=>x.weight)):null;
      const trend=hist.length>=2?(hist[hist.length-1].weight>hist[hist.length-2].weight?'↑':hist[hist.length-1].weight<hist[hist.length-2].weight?'↓':'→'):null;
      const last=hist.length?hist[hist.length-1].weight:null;
      h+=`<div class="prog-ex-card">
        <div class="prog-ex-header">
          <div>
            <div class="prog-ex-name">${ex.name}</div>
            <div class="prog-ex-sub">${ex.target} · ${ex.equip}</div>
          </div>
          <div style="text-align:left">
            ${pr!==null?`<div style="font-size:11px;color:var(--muted)">🏆 PR</div><div style="font-size:16px;font-weight:800;color:${day.color}">${pr}kg</div>`:''}
          </div>
        </div>
        <div class="prog-stats">
          ${last!==null?`<span class="prog-stat" style="background:${day.light};color:${day.dark}">آخر جلسة: ${last}kg</span>`:''}
          ${trend?`<span class="prog-stat" style="background:${trend==='↑'?'#D1FAE5':trend==='↓'?'#FEE2E2':'#F3F4F6'};color:${trend==='↑'?'#065F46':trend==='↓'?'#991b1b':'#374151'}">${trend} الاتجاه</span>`:''}
          <span class="prog-stat" style="background:var(--light);color:var(--muted)">${hist.length} جلسة</span>
        </div>
        ${hist.length>=2?drawChart(hist,day.color):`<div class="no-data">📊 تحتاج جلستين على الأقل</div>`}
      </div>`;
    });
  });
  document.getElementById('prog-content').innerHTML=h||`<div class="no-data" style="padding:40px 0">لا توجد تمارين بأوزان في هذا اليوم</div>`;
}

function drawChart(hist,color){
  const W=320,H=90,padL=38,padR=10,padT=10,padB=20;
  const iW=W-padL-padR,iH=H-padT-padB;
  const weights=hist.map(x=>x.weight);
  const minW=Math.min(...weights),maxW=Math.max(...weights);
  const range=maxW-minW||1;
  const pts=hist.map((x,i)=>{
    const px=padL+i/(Math.max(hist.length-1,1))*iW;
    const py=padT+iH-(x.weight-minW)/range*iH;
    return{x:px,y:py,w:x.weight};
  });
  const pathD=pts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const fillD=pathD+` L${pts[pts.length-1].x.toFixed(1)},${(padT+iH).toFixed(1)} L${pts[0].x.toFixed(1)},${(padT+iH).toFixed(1)} Z`;
  let svg=`<svg class="prog-chart" viewBox="0 0 ${W} ${H}">`;
  svg+=`<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+iH}" stroke="#E5E7EB" stroke-width="1"/>`;
  svg+=`<line x1="${padL}" y1="${padT+iH}" x2="${W-padR}" y2="${padT+iH}" stroke="#E5E7EB" stroke-width="1"/>`;
  svg+=`<text x="${padL-3}" y="${padT+5}" text-anchor="end" font-size="9" fill="#9CA3AF">${maxW}</text>`;
  svg+=`<text x="${padL-3}" y="${padT+iH+1}" text-anchor="end" font-size="9" fill="#9CA3AF">${minW}</text>`;
  const hexAlpha=color+'22';
  svg+=`<path d="${fillD}" fill="${color}" opacity="0.12"/>`;
  svg+=`<path d="${pathD}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
  pts.forEach((p,i)=>{
    svg+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="${color}" stroke="white" stroke-width="1.5"/>`;
    if(i===pts.length-1){
      svg+=`<text x="${(p.x+6).toFixed(1)}" y="${(p.y+4).toFixed(1)}" font-size="9" font-weight="700" fill="${color}">${p.w}kg</text>`;
    }
  });
  if(hist.length<=6){
    pts.forEach((p,i)=>{
      svg+=`<text x="${p.x.toFixed(1)}" y="${(padT+iH+13).toFixed(1)}" text-anchor="middle" font-size="8" fill="#9CA3AF">${hist[i].date.slice(5)}</text>`;
    });
  }
  svg+='</svg>';
  return svg;
}

// History
function renderHistory(){
  const logs=allLogs().sort((a,b)=>b.key.localeCompare(a.key));
  const list=document.getElementById('hist-list');
  if(!logs.length){list.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div>لا يوجد سجل بعد<br>ابدأ تدريبك الأول!</div></div>`;return}
  list.innerHTML='';
  logs.forEach(l=>{
    const parts=l.key.split('_');
    const dayId=parseInt(parts[1].replace('d',''));
    const dateStr=parts.slice(2).join('_');
    const day=DAYS.find(d=>d.id===dayId);if(!day)return;
    const done=cntDone(l.data),total=totSets(day);
    const {arabic,gregorian}=fmtDate(dateStr);
    const exMap={};
    Object.entries(l.data).forEach(([sk,sv])=>{
      const p=sk.split('_');const eid=p[1];
      if(!exMap[eid])exMap[eid]={weights:[],done:0};
      if(sv.done)exMap[eid].done++;
      if(sv.weight)exMap[eid].weights.push(sv.weight);
    });
    let exH='';
    day.blocks.forEach(blk=>blk.exercises.forEach(ex=>{
      const ed=exMap[ex.id];if(!ed||ed.done===0)return;
      const wStr=ed.weights.length?[...new Set(ed.weights)].map(w=>`${w}kg`).join(' / '):'BW';
      exH+=`<div class="hist-ex"><span class="hist-ex-name">${ex.name}</span>
        <div class="hist-pills"><span class="hist-pill">${ed.done}/${ex.sets} ✓</span><span class="hist-pill">${wStr}</span></div></div>`;
    }));
    list.innerHTML+=`<div class="hist-card">
      <div class="hist-header">
        <div>
          <div class="hist-date-main">${arabic}</div>
          <div class="hist-date-sub">${gregorian}</div>
          <span class="hist-day-badge" style="background:${day.light};color:${day.dark}">${day.title} — ${day.subtitle}</span>
          <div class="hist-progress">${done}/${total} سيت مكتمل</div>
        </div>
        <button class="hist-del" onclick="delEntry('${l.key}')">🗑</button>
      </div>
      <div class="hist-exercises">${exH}</div>
    </div>`;
  });
}

function delEntry(key){
  if(confirm('حذف هذا التسجيل؟')){delLog(key);renderHistory();renderHome();showToast('🗑 تم الحذف')}
}

function exportCSV(){
  const logs=allLogs().sort((a,b)=>a.key.localeCompare(b.key));
  if(!logs.length){showToast('لا يوجد بيانات للتصدير');return}
  let csv='\uFEFFالتاريخ,الميلادي,اليوم,التمرين,الجهاز,السيت,الوزن,التكرار,مكتمل\n';
  logs.forEach(l=>{
    const parts=l.key.split('_');
    const dayId=parseInt(parts[1].replace('d',''));
    const dateStr=parts.slice(2).join('_');
    const day=DAYS.find(d=>d.id===dayId);if(!day)return;
    const {arabic,gregorian}=fmtDate(dateStr);
    day.blocks.forEach(blk=>blk.exercises.forEach(ex=>{
      for(let s=1;s<=ex.sets;s++){
        const sk=`${dayId}_${ex.id}_s${s}`;
        const sv=l.data[sk]||{};
        csv+=`"${arabic}","${gregorian}","${day.title} - ${day.subtitle}","${ex.name}","${ex.equip}",${s},"${sv.weight||''}","${ex.reps}","${sv.done?'نعم':'لا'}"\n`;
      }
    }));
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`تدريبي_${td()}.csv`;a.click();
  URL.revokeObjectURL(url);
  showToast('✅ تم التصدير!');
}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  if(tab==='home'){showScreen('home');renderHome()}
  else if(tab==='progress'){showScreen('progress');renderProgress()}
  else{showScreen('history');renderHistory()}
}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(`screen-${name}`).classList.remove('hidden');
  document.getElementById(`screen-${name}`).scrollTop=0;
  document.getElementById('tab-bar').style.display=name==='workout'?'none':'flex';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{})}
